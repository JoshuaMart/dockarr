# ============================================================================
# Dockarr — *arr media stack
# Pinned image versions are the source of truth. Update them via Renovate PRs
# (see renovate.json) then deploy with `make update`.
# ============================================================================

x-common: &common
  restart: unless-stopped
  environment: &common-env
    PUID: ${PUID:-1000}
    PGID: ${PGID:-1000}
    TZ: ${TZ:-Etc/UTC}
  networks:
    - dockarr

services:
  # --- Reverse proxy --------------------------------------------------------
  caddy:
    <<: *common
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOCKARR_DOMAIN: ${DOCKARR_DOMAIN:-dockarr.local}
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config

  # --- Landing dashboard ----------------------------------------------------
  # Static PHP page listing every service with a live up/down status (probed
  # server-side). COMPOSE_PROFILES / COMPOSE_FILE / DOCKARR_LANG are passed in so
  # it can tell which optional services are on and in which language to render.
  dashboard:
    <<: *common
    image: php:8.5-apache@sha256:eacc0d98992683cb46e4f8f44b2418a0323855dc8b59d32dc54f7a9b90a966dd
    container_name: dashboard
    environment:
      <<: *common-env
      DOCKARR_DOMAIN: ${DOCKARR_DOMAIN:-dockarr.local}
      DOCKARR_LANG: ${DOCKARR_LANG:-en}
      COMPOSE_PROFILES: ${COMPOSE_PROFILES:-}
      COMPOSE_FILE: ${COMPOSE_FILE:-}
    volumes:
      - ./dashboard:/var/www/html:ro
    ports:
      - "8081:80"

  # --- Download client ------------------------------------------------------
  qbittorrent:
    <<: *common
    image: lscr.io/linuxserver/qbittorrent:5.2.3@sha256:b024436f8ca665d16d9a997d26fd27fdf867ee5566ba09f32764e7b2976d3e02
    container_name: qbittorrent
    environment:
      <<: *common-env
      WEBUI_PORT: ${QBITTORRENT_WEBUI_PORT:-8080}
    volumes:
      - ${DOCKARR_CONFIG}/qbittorrent:/config
      - ${DOCKARR_DATA}:/data
      # Hardlinks finished book downloads into the Kavita library (run on
      # torrent completion; wired by the qbittorrent-setup bootstrap module).
      - ./qbittorrent/on-complete.sh:/scripts/on-complete.sh:ro
    ports:
      - "${QBITTORRENT_WEBUI_PORT:-8080}:${QBITTORRENT_WEBUI_PORT:-8080}"
      - "6881:6881"
      - "6881:6881/udp"

  # Modern web UI for qBittorrent (autobrr/qui)
  qui:
    <<: *common
    image: ghcr.io/autobrr/qui:latest@sha256:b1abd18f1d544cd5c63a3b8d9c8a91d097143e04df416567a8cb52040f380ca8
    container_name: qui
    volumes:
      - ${DOCKARR_CONFIG}/qui:/config
    ports:
      - "7476:7476"

  # --- Indexers -------------------------------------------------------------
  prowlarr:
    <<: *common
    image: lscr.io/linuxserver/prowlarr:2.4.0@sha256:4fd7a166c8f46dd3370a871c250ee577d6c2ae97a0dbe0e3614b5ef736205620
    container_name: prowlarr
    volumes:
      - ${DOCKARR_CONFIG}/prowlarr:/config
    ports:
      - "9696:9696"

  # --- Movies ---------------------------------------------------------------
  radarr:
    <<: *common
    image: lscr.io/linuxserver/radarr:6.3.0@sha256:e35056574cdc695a9ee745aa1ecda9eab3842450bf4b7b8471b023790fa3861d
    container_name: radarr
    volumes:
      - ${DOCKARR_CONFIG}/radarr:/config
      - ${DOCKARR_DATA}:/data
    ports:
      - "7878:7878"

  # --- TV shows -------------------------------------------------------------
  sonarr:
    <<: *common
    image: lscr.io/linuxserver/sonarr:4.0.19@sha256:24acea2956a0ccb11f103877d9f4f8576600fb34bff34820ed749c2256dab89f
    container_name: sonarr
    volumes:
      - ${DOCKARR_CONFIG}/sonarr:/config
      - ${DOCKARR_DATA}:/data
    ports:
      - "8989:8989"

  # --- Quality profiles / custom formats sync -------------------------------
  profilarr:
    <<: *common
    image: ghcr.io/dictionarry-hub/profilarr:latest@sha256:7a9b5112ff227320d17c65ab643a5d875713e6235991ef04a8e482ec51427902
    container_name: profilarr
    environment:
      <<: *common-env
      # SvelteKit form actions reject cross-origin POSTs unless ORIGIN matches
      # the external URL served by Caddy (scheme + host + port).
      ORIGIN: https://profilarr.${DOCKARR_DOMAIN:-dockarr.local}
    volumes:
      - ${DOCKARR_CONFIG}/profilarr:/config
    ports:
      - "6868:6868"

  # --- Requests -------------------------------------------------------------
  seerr:
    <<: *common
    image: ghcr.io/seerr-team/seerr:latest@sha256:c92d2dc117f62185e7bcb88cd56efd374ea79210eaf433275449e8d5988eb5a8
    container_name: seerr
    volumes:
      - ${DOCKARR_CONFIG}/seerr:/app/config
    ports:
      - "5055:5055"

  # --- Media server (video) -------------------------------------------------
  jellyfin:
    <<: *common
    image: lscr.io/linuxserver/jellyfin:10.11.11@sha256:32aa0d4565c633db95af29a58e8a5dc9becdfa58564a3aea68436623fd45f5a1
    container_name: jellyfin
    volumes:
      - ${DOCKARR_CONFIG}/jellyfin:/config
      - ${DOCKARR_DATA}/media:/media:ro
    ports:
      - "8096:8096"
      - "7359:7359/udp" # client auto-discovery
      - "1900:1900/udp" # DLNA

  # --- Media server (books / comics / manga) --------------------------------
  kavita:
    <<: *common
    image: lscr.io/linuxserver/kavita:0.9.0@sha256:67752ab7c059b61e3204e875695760e04d655684576c539ab2f5892bbd13c267
    container_name: kavita
    # Optional service: only started when "kavita" is in COMPOSE_PROFILES (.env).
    # The bootstrap toggles that flag from the first-run prompt, so `make up` and
    # `make update` honour the choice without restarting a disabled Kavita.
    profiles: ["kavita"]
    volumes:
      - ${DOCKARR_CONFIG}/kavita:/config
      - ${DOCKARR_DATA}/media/books:/books
    ports:
      - "${KAVITA_PORT:-5000}:5000"

  # OPTIONAL — route qBittorrent through a VPN (Gluetun) by enabling it at
  # `make install` (or `make bootstrap m=vpn`). The bootstrap then sets
  # COMPOSE_FILE=docker-compose.yml:docker-compose.vpn.yml in .env, which layers
  # the gluetun service and rewires qBittorrent. See docker-compose.vpn.yml and
  # docs/vpn.

networks:
  dockarr:
    name: dockarr
